name: Devi
options:
  bundleIdPrefix: com.hareeshnagaraj.devi
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    SWIFT_STRICT_CONCURRENCY: minimal

packages:
  Solar:
    url: https://github.com/ceeK/Solar
    from: "3.0.0"
  SwissEphemeris:
    url: https://github.com/vsmithers1087/SwissEphemeris
    from: "0.0.99"

targets:
  Devi:
    type: application
    platform: iOS
    sources:
      - Devi
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "0.9.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Devi uses your location to calculate accurate sunrise, sunset, and prayer times for your area."
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
    dependencies:
      - package: Solar
      - package: SwissEphemeris
