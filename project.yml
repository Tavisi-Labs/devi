name: Devi
options:
  bundleIdPrefix: com.hareeshnagaraj.devi
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    SWIFT_STRICT_CONCURRENCY: minimal

packages:
  Solar:
    url: https://github.com/ceeK/Solar
    from: "3.0.0"
  SwissEphemeris:
    url: https://github.com/vsmithers1087/SwissEphemeris
    from: "0.0.99"

targets:
  Devi:
    type: application
    platform: iOS
    sources:
      - Devi
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.hareeshnagaraj.devi
        DEVELOPMENT_TEAM: KTK5RL3ZR3
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.3.0"
        CURRENT_PROJECT_VERSION: "13"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIRequiresFullScreen: true
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Devi uses your location to calculate accurate sunrise, sunset, and prayer times for your area."
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_NSMotionUsageDescription: "Devi uses device motion to create an immersive gyroscope-driven sky experience."
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
    dependencies:
      - package: Solar
      - package: SwissEphemeris
  DeviTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - DeviTests
    dependencies:
      - target: Devi
      - package: SwissEphemeris
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Devi.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Devi"
        BUNDLE_LOADER: "$(TEST_HOST)"
  DeviUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - DeviUITests
    dependencies:
      - target: Devi
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
